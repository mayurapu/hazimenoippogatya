<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>がちゃランド</title>

<style>

body{
    margin:0;
    padding:30px;
    background:#eef8ff;
    font-family:sans-serif;
    text-align:center;
}

h1{
    color:#1d4e89;
    font-size:60px;
    margin-bottom:10px;
}

.sub{
    font-size:28px;
    color:#666;
    margin-bottom:50px;
}

.box{
    max-width:1200px;
    margin:auto;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:30px;
}

.card{
    width:280px;
    background:white;
    border-radius:30px;
    padding:35px;
    box-shadow:0 0 20px rgba(0,0,0,.15);
    transition:0.2s;
}

.card:hover{
    transform:translateY(-5px);
}

.icon{
    font-size:80px;
}

.title{
    font-size:40px;
    color:#1d4e89;
    margin-top:20px;
}

.text{
    font-size:24px;
    color:gray;
    margin:25px 0;
    line-height:1.5;
}

.button{
    display:inline-block;
    text-decoration:none;
    background:#4CAF50;
    color:white;
    font-size:30px;
    padding:18px 35px;
    border-radius:20px;
}

.button:hover{
    background:#388e3c;
}

.footer{
    margin-top:70px;
    font-size:22px;
    color:gray;
}

</style>
</head>

<body>

<h1>🎡 がちゃランド 🎡</h1>

<div class="sub">
やりたいことを たのしく きめよう！<br>
はじめのいっぽを ふみだそう！
</div>

<div class="box">

<!-- 本ガチャ -->
<div class="card">

<div class="icon">
📚
</div>

<div class="title">
本ガチャ
</div>

<div class="text">
どんな本を読むか<br>
ルーレットで決めよう！
</div>

<a class="button" href="HONGATYA.html">
スタート！
</a>

</div>


<!-- やることガチャ -->
<div class="card">

<div class="icon">
🎲
</div>

<div class="title">
やることガチャ
</div>

<div class="text">
今日やることを<br>
ルーレットで決めよう！
</div>

<a class="button" href="yarukotogatya.html">
スタート！
</a>

</div>


<!-- 数字ガチャ -->
<div class="card">

<div class="icon">
🔢
</div>

<div class="title">
数字ガチャ
</div>

<div class="text">
じゅんばんや<br>
ラッキーナンバーを<br>
決めよう！
</div>

<a class="button" href="suuzigatya.html">
スタート！
</a>

</div>

</div>

<div class="footer">
🌈 がちゃを回して たのしくチャレンジ！ 🌈
</div>

</body>
</html>
