<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>やることルーレット（表示/非表示付き）</title>
<style>
  :root{
    --bg:#eef8ff; --card:#fff; --accent:#1d4e89; --muted:#6b7280;
    --primary:#4CAF50; --primary-dark:#388e3c; --panel:#f7fbff;
  }
  html,body{height:100%;margin:0;font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",sans-serif;background:var(--bg);color:#111}
  .wrap{max-width:980px;margin:18px auto;padding:14px}
  h1{color:var(--accent);font-size:32px;margin:0 0 12px;text-align:center}
  .box{background:var(--card);border-radius:14px;padding:18px;box-shadow:0 6px 20px rgba(15,23,42,0.06)}
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center;margin-bottom:12px}
  .btn{background:var(--primary);color:#fff;border:none;padding:10px 14px;border-radius:10px;font-size:15px;cursor:pointer}
  .btn:hover{background:var(--primary-dark)}
  .hint{color:var(--muted);font-size:13px;text-align:center;margin-bottom:8px}

  .section{margin:12px 0;border-radius:10px;padding:10px;background:linear-gradient(180deg,#fbfeff,#f3f9ff)}
  .section-head{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .section-title{font-weight:700;color:#0f3b66}
  .section-actions{display:flex;gap:6px;align-items:center}
  .small-btn{background:transparent;border:1px solid #dbeafe;padding:6px 8px;border-radius:8px;color:#0f3b66;cursor:pointer;font-size:13px}

  .grid{display:grid;gap:8px;align-items:center}
  .grid.activities{grid-template-columns:repeat(auto-fit,minmax(140px,1fr));margin-top:8px}
  .grid.categories{grid-template-columns:repeat(auto-fit,minmax(120px,1fr));margin-top:8px}

  .checkbox-label{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;background:transparent;cursor:pointer}
  .checkbox-label input{width:18px;height:18px}

  .result{margin-top:12px;text-align:center}
  #rarity{font-size:26px;min-height:36px}
  #activity{font-size:28px;margin-top:6px;min-height:40px}
  #category{font-size:18px;margin-top:6px;color:#2b6cb0;min-height:28px}
  #step{font-size:22px;margin-top:8px;color:#e91e63;min-height:40px;font-weight:700}

  .muted{color:var(--muted);font-size:13px;text-align:center;margin-top:8px}

  @media (max-width:640px){
    h1{font-size:24px}
    .grid.categories{grid-template-columns:repeat(2,1fr)}
    .grid.activities{grid-template-columns:repeat(2,1fr)}
    #activity{font-size:20px}
    #step{font-size:18px}
  }
</style>
</head>
<body>

<div class="wrap">

<h1>🎲 やることルーレット</h1>

<div class="box">

<div class="controls">
<button class="btn" id="startBtn">🎡 スタート</button>
<button class="btn" id="showSelectedOnly">選択済みだけ表示</button>
<button class="btn" id="showAll">全表示</button>
<button class="btn" id="hideAll">全非表示</button>
</div>

<div class="hint">
各セクションの「表示/非表示」やフィルタで画面をすっきりできます。
何も選ばなければ全てが抽選対象です。
</div>


<!-- 活動 -->
<div class="section" id="section-activities">

<div class="section-head">

<div class="section-title">
🎯 抽選する活動
</div>

<div class="section-actions">

<button class="small-btn"
onclick="toggleSection('section-activities')">
表示/非表示
</button>

<button class="small-btn"
onclick="selectAllActivities()">
全選択
</button>

<button class="small-btn"
onclick="clearAllActivities()">
解除
</button>

</div>

</div>

<div class="grid activities" id="activityGrid">
</div>

</div>


<!-- カテゴリ一覧（自動生成される） -->
<div id="categoryArea">
</div>


<!-- 結果 -->
<div class="result">

<div id="rarity">
なにが出るかな？
</div>

<div id="activity">
なにをする？
</div>

<div id="category">
どのカテゴリ？
</div>

<div id="step">
どこまでやる？
</div>

</div>


<div class="muted">
できたら おしまい！
つづけてもOK！
ミッションがおわると、もう1回ガチャ！
</div>

</div>

</div>

</body>
  
<script>

//=====================
// データ読み込み
//=====================

let data = JSON.parse(localStorage.getItem("gachaData"));

if(!data){

  data={

    "📚 読書":{
      "絵本":["1ページ読む"],
      "物語":["1ページ読む"]
    },

    "✏️ お絵描き":{
      "キャラ":["1つかく"]
    }

  };

}


//=====================
// missions作成
//=====================

const missions={};

for(let activity in data){

  missions[activity]={

    categories:Object.keys(data[activity]),

    steps:data[activity]

  };

}

const activities=Object.keys(missions);


//=====================
// 活動チェックボックス生成
//=====================

let activityHTML="";

activities.forEach(act=>{

  activityHTML+=`
  <label class="checkbox-label">
  <input
  type="checkbox"
  class="actCheck"
  value="${act}">
  ${act}
  </label>
  `;

});

document.getElementById("activityGrid").innerHTML=
activityHTML;


//=====================
// カテゴリ一覧生成
//=====================

let categoryHTML="";

activities.forEach(act=>{

  categoryHTML+=`

<div class="section" id="section-${act}">

<div class="section-head">

<div class="section-title">
${act} のカテゴリ
</div>

<div class="section-actions">

<button class="small-btn"
onclick="toggleSection('section-${act}')">
表示/非表示
</button>

<button class="small-btn"
onclick="selectAllCats('${act}')">
全選択
</button>

<button class="small-btn"
onclick="clearAllCats('${act}')">
解除
</button>

</div>

</div>

<div class="grid categories">

`;

  missions[act].categories.forEach(cat=>{

    categoryHTML+=`

<label class="checkbox-label">

<input
type="checkbox"
class="catCheck"
data-act="${act}"
value="${cat}">

${cat}

</label>

`;

  });

  categoryHTML+=`

</div>
</div>

`;

});

document.getElementById("categoryArea").innerHTML=
categoryHTML;


//=====================
// レアミッション
//=====================

const rareMission=[
"好きなキャラをかく",
"5分チャレンジ",
"半分までやる",
"1つ完成させる"
];

const superMission=[
"好きなのをえらんでいい！",
"先生とそうだんして決める！",
"今日のおすすめをやる！",
"新しいことにチャレンジ！"
];

const ultraMission=[
"5分自由タイム！",
"好きなことをえらんでいい！",
"先生と特別ミッション！",
"今日はラッキーデー！"
];


//=====================
// 共通
//=====================

function randomItem(arr){

  return arr[
    Math.floor(Math.random()*arr.length)
  ];

}


//=====================
// 選択された活動
//=====================

function getSelectedActivities(){

  const checks=
  document.querySelectorAll(".actCheck:checked");

  const selected=
  Array.from(checks).map(c=>c.value);

  return selected.length
  ? selected
  : activities;

}


//=====================
// 選択されたカテゴリ
//=====================

function getSelectedCategoriesFor(act){

  const checks=
  document.querySelectorAll(
'.catCheck[data-act="'+act+'"]:checked'
);

  const selected=
  Array.from(checks).map(c=>c.value);

  return selected.length
  ? selected
  : missions[act].categories;

}


//=====================
// ミッション取得
//=====================

function getMissionFor(act){

  const cat=
  randomItem(
  getSelectedCategoriesFor(act)
  );

  return{

    category:cat,

    step:
    randomItem(
    missions[act].steps[cat]
    )

  };

}


//=====================
// ルーレット
//=====================

function roulette(){

  let count=0;

  const spinner=setInterval(()=>{

    const act=
    randomItem(
    getSelectedActivities()
    );

    const m=
    getMissionFor(act);

    activity.textContent=act;

    category.textContent=
    "カテゴリ："+m.category;

    step.textContent=
    m.step;

    count++;

    if(count>40){

      clearInterval(spinner);

      finish();

    }

  },90);

}


//=====================
// 結果
//=====================

function finish(){

  const r=Math.random();

  if(r<0.7){

    rarity.textContent=
    "⭐ ノーマル";

    const act=
    randomItem(
    getSelectedActivities()
    );

    const m=
    getMissionFor(act);

    activity.textContent=act;

    category.textContent=
    "カテゴリ："+m.category;

    step.textContent=
    m.step;

  }

  else if(r<0.9){

    rarity.textContent=
    "⭐⭐ レア";

    activity.textContent=
    "✨ レアミッション";

    category.textContent="";

    step.textContent=
    randomItem(rareMission);

  }

  else if(r<0.98){

    rarity.textContent=
    "⭐⭐⭐ スーパーレア";

    activity.textContent=
    "🌟 スーパーミッション";

    category.textContent="";

    step.textContent=
    randomItem(superMission);

  }

  else{

    rarity.textContent=
    "🌈✨ ウルトラレア！！";

    activity.textContent=
    "🎉 ウルトラミッション";

    category.textContent="";

    step.textContent=
    randomItem(ultraMission);

  }

}


//=====================
// 表示切替
//=====================

function toggleSection(id){

  const sec=
  document.getElementById(id);

  if(sec.style.display==="none"){

    sec.style.display="";

  }

  else{

    sec.style.display="none";

  }

}

function showAllSections(){

  document
  .querySelectorAll(".section")
  .forEach(s=>s.style.display="");

}

function hideAllSections(){

  document
  .querySelectorAll(".section")
  .forEach(s=>s.style.display="none");

}

function selectAllActivities(){

  document
  .querySelectorAll(".actCheck")
  .forEach(c=>c.checked=true);

}

function clearAllActivities(){

  document
  .querySelectorAll(".actCheck")
  .forEach(c=>c.checked=false);

}

function selectAllCats(act){

  document
  .querySelectorAll(
'.catCheck[data-act="'+act+'"]'
)
  .forEach(c=>c.checked=true);

}

function clearAllCats(act){

  document
  .querySelectorAll(
'.catCheck[data-act="'+act+'"]'
)
  .forEach(c=>c.checked=false);

}


//=====================
// ボタン
//=====================

startBtn.addEventListener(
"click",
roulette
);

showAll.addEventListener(
"click",
showAllSections
);

hideAll.addEventListener(
"click",
hideAllSections
);

</script>
  
</body>
</html>
